name: Deploy System Monitoring Dashboard

on:
  push:
    branches: ["main"]
    paths:
      - "system-monitoring-dashboard/**"
      - ".github/workflows/system-monitoring-dashboard-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: system-monitoring-dashboard-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: system-monitoring-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: system-monitoring-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/system-monitoring-dashboard
          NEXT_PUBLIC_DATA_SOURCE: firebase
          NEXT_PUBLIC_DEVICE_ID: ${{ vars.NEXT_PUBLIC_DEVICE_ID }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p ../pages-artifact/system-monitoring-dashboard
          cp -R out/. ../pages-artifact/system-monitoring-dashboard/

      - name: Preserve existing root HTML tools
        shell: bash
        working-directory: .
        run: |
          mkdir -p pages-artifact
          find . -maxdepth 1 -type f -name "*.html" -exec cp {} pages-artifact/ \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}system-monitoring-dashboard/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
