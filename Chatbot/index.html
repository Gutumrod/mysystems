<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ollama Cloud Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .chat-header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
        }
        .user-msg {
            align-self: flex-end;
            background: #0f3460;
            color: white;
        }
        .bot-msg {
            align-self: flex-start;
            background: rgba(255,255,255,0.15);
            color: #eee;
        }
        .bot-msg pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            font-size: 0.85em;
        }
        .bot-msg code {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9em;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: rgba(0,0,0,0.3);
        }
        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            font-size: 1em;
        }
        .input-area input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .input-area button {
            margin-left: 10px;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            background: #e94560;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover {
            background: #ff6b81;
        }
        .input-area button:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🤖 Ollama Cloud เพื่อนซี้</div>
        <div class="messages" id="messages">
            <div class="message bot-msg">สวัสดี! ถามอะไรก็ได้เลยนะ 😊</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="ถามอะไรก็ได้..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // เรียก backend เราเอง (เซิร์ฟเวอร์ที่จะ deploy)
        const BACKEND_URL = './api/chat';

        let conversationHistory = [];
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'user-msg' : 'bot-msg');

            if (role === 'assistant') {
                const md = marked.parse(text, { breaks: true });
                msgDiv.innerHTML = DOMPurify.sanitize(md);
            } else {
                msgDiv.textContent = text;
            }

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return msgDiv;
        }

        let typingEl = null;
        function showTyping() {
            typingEl = document.createElement('div');
            typingEl.classList.add('message', 'bot-msg');
            typingEl.textContent = 'กำลังคิด...';
            messagesDiv.appendChild(typingEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            if (typingEl) { typingEl.remove(); typingEl = null; }
        }

        function setLoading(loading) {
            sendBtn.disabled = loading;
            userInput.disabled = loading;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            conversationHistory.push({ role: 'user', content: text });
            userInput.value = '';
            setLoading(true);
            showTyping();

            try {
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
                    throw new Error(err.error || `Server error: ${res.status}`);
                }

                const data = await res.json();
                removeTyping();
                addMessage('assistant', data.reply);
                conversationHistory.push({ role: 'assistant', content: data.reply });
            } catch (error) {
                removeTyping();
                addMessage('assistant', '⚠️ ขออภัย เกิดข้อผิดพลาด: ' + error.message);
            } finally {
                setLoading(false);
            }
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });
    </script>

    <!-- Markdown renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- XSS sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
